steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/lexguard:$SHORT_SHA
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/lexguard:$SHORT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - lexguard
      - --image
      - gcr.io/$PROJECT_ID/lexguard:$SHORT_SHA
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - GOOGLE_CLOUD_PROJECT=$PROJECT_ID,AI_PROVIDER=vertex,VERTEX_LOCATION=global,VERTEX_MODEL=gemini-2.5-flash
images:
  - gcr.io/$PROJECT_ID/lexguard:$SHORT_SHA
